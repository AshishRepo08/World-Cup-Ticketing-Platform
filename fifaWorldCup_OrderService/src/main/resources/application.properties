spring.application.name=fifaWorldCup_OrderService

server.port = 9001
server.servlet.context-path = /order

spring.datasource.url=jdbc:mysql://localhost:3307/ticket_order_service_db
spring.datasource.username=root
spring.datasource.password=mysql
spring.jpa.hibernate.ddl-auto=update

inventoryService.url = http://localhost:8082


springdoc.swagger-ui.path = /swagger-ui.html

#For Documentation In Form Of JSON
springdoc.api-docs.path = /api-docs

#Kafka Properties
spring.kafka.bootstrap-servers = localhost:9092
spring.kafka.template.default-topic = ticket-order-placed
spring.kafka.producer.key-serializer = org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer = org.springframework.kafka.support.serializer.JsonSerializer



